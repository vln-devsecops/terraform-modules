name: Terraform Integration

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - 'release/v*'
  schedule:
    - cron: "17 4 * * 0"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkov:
    runs-on: ubuntu-latest
    env:
      CHECKOV_VERSION: "3.2.525"
      CHECKOV_SKIP_CHECKS: "CKV_AWS_18,CKV_AWS_109,CKV_AWS_111,CKV_AWS_115,CKV_AWS_116,CKV_AWS_117,CKV_AWS_144,CKV_AWS_272,CKV_AWS_356,CKV2_AWS_57,CKV2_AWS_61,CKV2_AWS_62,CKV_AWS_21,CKV_AWS_68,CKV_AWS_70,CKV_AWS_86,CKV_AWS_145,CKV_AWS_310,CKV_AWS_374,CKV2_AWS_10,CKV2_AWS_32,CKV2_AWS_47,CKV2_AWS_12,CKV2_AWS_11,CKV2_AWS_64,CKV_AWS_130"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Checkov
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          pip install "checkov==${CHECKOV_VERSION}"

      - name: Run Checkov compliance scan
        shell: bash
        run: |
          set -euo pipefail

          checkov \
            -d . \
            --framework terraform,github_actions \
            --skip-path tests \
            --quiet \
            --skip-check "${CHECKOV_SKIP_CHECKS}"

          {
            echo "## Scheduled compliance scan"
            echo
            echo "| Check | Scope | Result |"
            echo "| --- | --- | --- |"
            echo "| \`checkov\` | terraform and GitHub Actions, excluding \`tests/\` fixtures | pass |"
            echo
            echo "Deferred shared-module controls remain intentionally allowlisted here until the modules grow explicit support for them:"
            echo
            echo "- deployment bucket logging, lifecycle, notifications, and cross-region replication"
            echo "- Lambda VPC attachment, reserved concurrency, DLQ wiring, and code signing"
            echo "- secret rotation workflow ownership"
            echo "- standard root-access KMS key policy delegation"
            echo "- CloudTrail CloudWatch Logs integration remains optional for this shared bucket module"
            echo "- static site CloudFront WAF, geo restriction, access logging, response headers policy, and origin failover"
            echo "- static site S3 KMS encryption and versioning (OAC-protected public content, not sensitive data)"
            echo "- VPC flow logs not enabled (callers that require flow logs must add them outside the module)"
            echo "- VPC public subnets auto-assign public IPs (intentional for runner and public-access workloads)"
            echo "- CKV_AWS_70 is skipped while Checkov 3.2.525 crashes on the generated S3 bucket policy document"
          } >> "${GITHUB_STEP_SUMMARY}"

  discover:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.discover.outputs.suites }}
      suite_count: ${{ steps.discover.outputs.suite_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Discover integration suites
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          import os
          import pathlib

          suites = sorted(str(path) for path in pathlib.Path("tests/aws").rglob("run.sh"))
          print(f"suite_count={len(suites)}")
          print(f"suites={json.dumps(suites)}")
          PY

          mapfile -t suites < <(find tests/aws -type f -name 'run.sh' | sort)

          {
            echo "## Terraform integration discovery"
            echo
            if [ "${#suites[@]}" -eq 0 ]; then
              echo "No executable provider-backed suites are defined yet."
            else
              printf 'Discovered %s executable provider-backed suite(s):\n' "${#suites[@]}"
              echo
              for suite in "${suites[@]}"; do
                printf -- '- `%s`\n' "${suite}"
              done
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  credential_gate:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: discover
    environment: vln-devsecops
    outputs:
      credentials_available: ${{ steps.gate.outputs.credentials_available }}
    steps:
      - name: Detect OIDC role
        id: gate
        shell: bash
        env:
          INTEGRATION_ROLE_ARN: ${{ vars.TERRAFORM_MODULES_INTEGRATION_ROLE_ARN }}
        run: |
          set -euo pipefail

          if [ -n "${INTEGRATION_ROLE_ARN}" ]; then
            echo "credentials_available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "credentials_available=false" >> "${GITHUB_OUTPUT}"
          fi

  integration:
    if: github.event_name != 'pull_request' && needs.discover.outputs.suite_count != '0' && needs.credential_gate.outputs.credentials_available == 'true'
    runs-on: ubuntu-latest
    needs:
      - discover
      - credential_gate
    environment: vln-devsecops
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.discover.outputs.suites) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TERRAFORM_MODULES_INTEGRATION_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.4

      - name: Derive suite metadata
        id: suite_meta
        shell: bash
        env:
          SUITE_PATH: ${{ matrix.suite }}
        run: |
          set -euo pipefail

          suite_dir="$(dirname "${SUITE_PATH}")"
          suite_name="${SUITE_PATH//\//-}"

          echo "suite_dir=${suite_dir}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=tfstate-${suite_name}-attempt-${GITHUB_RUN_ATTEMPT}" >> "${GITHUB_OUTPUT}"

      - name: Run provider-backed integration suite
        id: suite
        shell: bash
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          MAIL_TEST_BASE_DOMAIN: ${{ vars.MAIL_TEST_BASE_DOMAIN }}
          MAIL_TEST_ROUTE53_ZONE_ID: ${{ vars.MAIL_TEST_ROUTE53_ZONE_ID }}
          TF_LIVE_SUITE_CAPTURE_TFSTATE: "1"
          SUITE_PATH: ${{ matrix.suite }}
        run: |
          set -euo pipefail

          status="pass"
          set +e
          bash "${SUITE_PATH}"
          exit_code=$?
          set -e

          if [ "${exit_code}" -eq 2 ]; then
            status="skip"
          elif [ "${exit_code}" -ne 0 ]; then
            status="fail"
          fi

          echo "status=${status}" >> "${GITHUB_OUTPUT}"

          {
            echo "## Provider-backed integration suite"
            echo
            echo "| Suite | Result |"
            echo "| --- | --- |"
            printf '| `%s` | %s |\n' "${SUITE_PATH}" "${status}"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${status}" = "fail" ]; then
            exit 1
          fi

      - name: Upload Terraform state artifacts
        if: always()
        id: stage_artifacts
        shell: bash
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/${{ steps.suite_meta.outputs.artifact_name }}"
          suite_dir="${{ steps.suite_meta.outputs.suite_dir }}"
          found=0

          rm -rf "${artifact_dir}"
          mkdir -p "${artifact_dir}"

          for path in \
            "${suite_dir}/.cleanup-state" \
            "${suite_dir}/terraform.tfstate" \
            "${suite_dir}/terraform.tfstate.backup" \
            "${suite_dir}/crash.log"; do
            if [ -e "${path}" ]; then
              cp -R "${path}" "${artifact_dir}/"
              found=1
            fi
          done

          echo "artifact_dir=${artifact_dir}" >> "${GITHUB_OUTPUT}"
          echo "found=${found}" >> "${GITHUB_OUTPUT}"

      - name: Upload Terraform state artifacts
        if: always() && steps.stage_artifacts.outputs.found == '1'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.suite_meta.outputs.artifact_name }}
          if-no-files-found: error
          compression-level: 0
          include-hidden-files: true
          path: ${{ steps.stage_artifacts.outputs.artifact_dir }}

  integration_skipped:
    if: github.event_name != 'pull_request' && needs.discover.outputs.suite_count != '0' && needs.credential_gate.outputs.credentials_available != 'true'
    runs-on: ubuntu-latest
    needs:
      - discover
      - credential_gate
    steps:
      - name: Summarize skipped live suites
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Provider-backed integration execution"
            echo
            echo "Executable suites are present, but the workflow did not receive AWS credentials."
            echo
            echo "Set `TERRAFORM_MODULES_INTEGRATION_ROLE_ARN` and `AWS_REGION` as repository or environment variables so GitHub Actions can assume the role via OIDC."
            echo
            echo "The mail suite also needs `MAIL_TEST_BASE_DOMAIN` and `MAIL_TEST_ROUTE53_ZONE_ID` as repository or environment variables."
          } >> "${GITHUB_STEP_SUMMARY}"
