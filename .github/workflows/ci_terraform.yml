name: Terraform CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.4

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail

          terraform fmt -check -recursive

          {
            echo "## Terraform formatting"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| \`terraform fmt -check -recursive\` | pass |"
          } >> "${GITHUB_STEP_SUMMARY}"

  tflint:
    runs-on: ubuntu-latest
    env:
      TFLINT_VERSION: "0.62.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install TFLint
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.local/bin"
          curl -fsSL -o /tmp/tflint.zip "https://github.com/terraform-linters/tflint/releases/download/v${TFLINT_VERSION}/tflint_linux_amd64.zip"
          unzip -q /tmp/tflint.zip -d "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

          "${HOME}/.local/bin/tflint" --init

      - name: Run TFLint
        shell: bash
        run: |
          set -euo pipefail

          tflint --recursive

          {
            echo "## Terraform linting"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| \`tflint --recursive\` | pass |"
          } >> "${GITHUB_STEP_SUMMARY}"

  trivy:
    runs-on: ubuntu-latest
    env:
      TRIVY_VERSION: "0.70.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Trivy
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.local/bin"
          curl -fsSL -o /tmp/trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf /tmp/trivy.tar.gz -C "${HOME}/.local/bin" trivy
          chmod +x "${HOME}/.local/bin/trivy"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run Trivy config scan
        shell: bash
        run: |
          set -euo pipefail

          trivy config --quiet --severity HIGH,CRITICAL --exit-code 1 --skip-dirs tests .

          {
            echo "## Terraform security scan"
            echo
            echo "| Check | Scope | Result |"
            echo "| --- | --- | --- |"
            echo "| \`trivy config\` | repository without \`tests/\` fixtures, HIGH/CRITICAL only | pass |"
          } >> "${GITHUB_STEP_SUMMARY}"

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify module test and example coverage
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t module_dirs < <(find modules -type f -name 'versions.tf' -not -path '*/.terraform/*' -printf '%h\n' | sort -u)

          if [ "${#module_dirs[@]}" -eq 0 ]; then
            echo "No Terraform modules found."
            exit 1
          fi

          summary_file="$(mktemp)"
          {
            echo "## Terraform coverage"
            echo
            echo "| Module | Contract tests | Assertions | Example |"
            echo "| --- | --- | --- | --- |"
          } > "${summary_file}"

          for module_dir in "${module_dirs[@]}"; do
            test_dir="${module_dir}/tests"
            example_dir="examples/${module_dir#modules/}"

            has_tests="yes"
            has_assertions="yes"
            has_example="yes"

            if [ ! -d "${test_dir}" ] || ! find "${test_dir}" -type f -name '*.tftest.hcl' | grep -q .; then
              has_tests="no"
              printf '| `%s` | %s | %s | %s |\n' "${module_dir}" "${has_tests}" "${has_assertions}" "${has_example}" >> "${summary_file}"
              cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"
              echo "Missing terraform test files for ${module_dir}"
              exit 1
            fi

            if ! grep -R -E '^[[:space:]]*assert[[:space:]]*\{' "${test_dir}" --include='*.tftest.hcl' >/dev/null; then
              has_assertions="no"
              printf '| `%s` | %s | %s | %s |\n' "${module_dir}" "${has_tests}" "${has_assertions}" "${has_example}" >> "${summary_file}"
              cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"
              echo "Terraform tests for ${module_dir} do not contain any assertions."
              exit 1
            fi

            if [ ! -f "${example_dir}/main.tf" ]; then
              has_example="no"
              printf '| `%s` | %s | %s | %s |\n' "${module_dir}" "${has_tests}" "${has_assertions}" "${has_example}" >> "${summary_file}"
              cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"
              echo "Missing matching example for ${module_dir}: expected ${example_dir}/main.tf"
              exit 1
            fi

            printf '| `%s` | %s | %s | %s |\n' "${module_dir}" "${has_tests}" "${has_assertions}" "${has_example}" >> "${summary_file}"
          done

          {
            echo
            printf '**Coverage result:** %s/%s modules have contract tests with assertions and a matching example.\n' "${#module_dirs[@]}" "${#module_dirs[@]}"
          } >> "${summary_file}"

          cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify README lists every module
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t module_dirs < <(find modules -type f -name 'versions.tf' -not -path '*/.terraform/*' -printf '%h\n' | sort -u)

          missing=()
          for module_dir in "${module_dirs[@]}"; do
            short="${module_dir#modules/}"
            if ! grep -qF "${short}" README.md; then
              missing+=("${module_dir}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "The following modules are not mentioned in README.md:"
            printf '  %s\n' "${missing[@]}"
            echo "Update the 'Current modules' section in README.md before merging."
            exit 1
          fi

          echo "README.md lists all ${#module_dirs[@]} discovered modules."

  modules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.4

      - name: Validate modules and run contract tests
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t module_dirs < <(find modules -type f -name 'versions.tf' -not -path '*/.terraform/*' -printf '%h\n' | sort -u)

          if [ "${#module_dirs[@]}" -eq 0 ]; then
            echo "No Terraform modules found."
            exit 1
          fi

          summary_file="$(mktemp)"
          {
            echo "## Terraform module validation and tests"
            echo
            echo "| Module | Validate | Contract tests |"
            echo "| --- | --- | --- |"
          } > "${summary_file}"

          for module_dir in "${module_dirs[@]}"; do
            echo "::group::${module_dir}"
            (
              cd "${module_dir}"
              terraform init -backend=false
              terraform validate

              terraform test
            )
            echo "::endgroup::"

            printf '| `%s` | pass | pass |\n' "${module_dir}" >> "${summary_file}"
          done

          {
            echo
            printf '**Module result:** validated %s modules and ran %s contract test suites.\n' "${#module_dirs[@]}" "${#module_dirs[@]}"
          } >> "${summary_file}"

          cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"

  examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.4

      - name: Validate examples
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t example_dirs < <(find examples -type f -name 'main.tf' -not -path '*/.terraform/*' -printf '%h\n' | sort -u)

          if [ "${#example_dirs[@]}" -eq 0 ]; then
            echo "No Terraform examples found."
            exit 1
          fi

          summary_file="$(mktemp)"
          {
            echo "## Terraform example validation"
            echo
            echo "| Example | Validate |"
            echo "| --- | --- |"
          } > "${summary_file}"

          for example_dir in "${example_dirs[@]}"; do
            echo "::group::${example_dir}"
            (
              cd "${example_dir}"
              terraform init -backend=false
              terraform validate
            )
            echo "::endgroup::"

            printf '| `%s` | pass |\n' "${example_dir}" >> "${summary_file}"
          done

          {
            echo
            printf '**Example result:** validated %s runnable examples.\n' "${#example_dirs[@]}"
          } >> "${summary_file}"

          cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"
